<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SafeFlow – UiTM Shah Alam Live Evacuation Map</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine/dist/leaflet-routing-machine.css"/>

<style>
html, body { height:100%; margin:0; }
#map { height:100%; width:100%; }

.legend {
  background:white;
  padding:12px;
  font-size:14px;
  line-height:1.6;
  border-radius:8px;
  box-shadow:0 0 15px rgba(0,0,0,0.25);
}

.legend i {
  width:16px;
  height:16px;
  float:left;
  margin-right:8px;
}

.circle { border-radius:50%; }

.emoji-icon {
  font-size:24px;
  text-align:center;
  line-height:24px;
}
</style>
</head>

<body>
<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.heat/dist/leaflet-heat.js"></script>
<script src="https://unpkg.com/leaflet-routing-machine/dist/leaflet-routing-machine.js"></script>

<script>
// ================= MAP INIT =================
// Centered over Shah Alam / UiTM Area
const map = L.map("map").setView([3.0900, 101.5000], 13);

L.tileLayer("https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png", {
  attribution:"© OpenStreetMap contributors, © CARTO"
}).addTo(map);

// ================= FIREBASE =================
const SENSOR_URL = "https://safeflow-68707-default-rtdb.asia-southeast1.firebasedatabase.app/sensors/A.json";
const AI_URL     = "https://safeflow-68707-default-rtdb.asia-southeast1.firebasedatabase.app/ai/A.json";

async function fetchJSON(url){
  try{
    const res = await fetch(url);
    if(!res.ok) return null;
    return await res.json();
  }catch(e){
    console.error("Fetch error:",e);
    return null;
  }
}

// ================= ICONS =================
const userIcon = L.divIcon({ html:'🏃', className:'emoji-icon', iconSize:[30,30] });
const shelterIcon = L.divIcon({ html:'🏠', className:'emoji-icon', iconSize:[30,30] });

// ================= SHELTER =================
// Relocated Safe Shelter to high ground near UiTM Shah Alam
const shelterLatLng = L.latLng(3.1150, 101.4450);
L.marker(shelterLatLng,{icon:shelterIcon})
 .bindPopup("<b>SAFE SHELTER</b><br>High Ground")
 .addTo(map);

// ================= FLOOD ZONES =================
const floodZones = [
  { name:"UiTM Shah Alam", lat:3.0696, lng:101.5038, offset:30 },
  { name:"Shah Alam City Centre", lat:3.0850, lng:101.5330, offset:45 },
  { name:"Padang Jawa", lat:3.0600, lng:101.5000, offset:35 },
  { name:"TTDI Jaya", lat:3.1050, lng:101.5500, offset:40 },
  { name:"Puncak Perdana", lat:3.1500, lng:101.4800, offset:20 },
  { name:"Alam Budiman / Setia Alam", lat:3.1200, lng:101.4400, offset:25 }
];

// ================= STATE =================
let geoLayer = null;
let heatLayer = null;
let routingControl = null;
let fallbackLine = null;
let userMarker = null;
let alertActive = false; 

// ================= ROUTE =================
function updateRoute(lat,lng){
  const start = L.latLng(lat,lng);

  if(fallbackLine){
    map.removeLayer(fallbackLine);
    fallbackLine = null;
  }

  if(!routingControl){
    routingControl = L.Routing.control({
      waypoints:[ start, shelterLatLng ],
      router: L.Routing.osrmv1({
        serviceUrl: 'https://router.project-osrm.org/route/v1'
      }),
      createMarker:()=>null,
      addWaypoints:false,
      draggableWaypoints:false,
      showAlternatives:false,
      lineOptions:{ styles:[{color:"red",weight:6,opacity:0.9}] }
    }).addTo(map);

    routingControl.on('routingerror', function(){
      const waypoints = routingControl.getPlan().getWaypoints();
      if(waypoints[0].latLng && waypoints[1].latLng) {
        fallbackLine = L.polyline([waypoints[0].latLng, waypoints[1].latLng], {
          color:'red',
          dashArray:'5,10',
          weight: 5,
          opacity: 0.8
        }).addTo(map);
      }
    });

  }else{
    routingControl.getPlan().setWaypoints([start, shelterLatLng]);
  }
}

// ================= GPS =================
function startLiveLocation(){
  if(!navigator.geolocation) return;

  navigator.geolocation.watchPosition(pos=>{
    const {latitude,longitude} = pos.coords;

    if(!userMarker){
      userMarker = L.marker([latitude,longitude],{icon:userIcon})
        .bindPopup("<b>You (Live Location)</b>")
        .addTo(map);
      map.setView([latitude,longitude],14); // Adjusted initial zoom level
    }else{
      userMarker.setLatLng([latitude,longitude]);
    }

    updateRoute(latitude,longitude);
  });
}

// ================= MAIN UPDATE =================
async function updateMap(){

  const ai = await fetchJSON(AI_URL);
  const sensor = await fetchJSON(SENSOR_URL);
  
  if(!ai || !sensor) return;

  // SAFE PARSING
  const confidence = Math.min(1, Math.max(0, Number(ai.confidence ?? 1))); 
  const predicted = Number(ai.predictedWaterLevel ?? 0);
  const ttd = Number(ai.timeToDanger ?? -1);
  const rain = Number(sensor.rain ?? 0);
  const trend = Number(ai.trendType ?? 0);
  const volume = Number(ai.calculatedVolumeLiters ?? 0); 

  let baseRisk =
    ai.riskCategory === 2 ? 80 :
    ai.riskCategory === 1 ? 50 : 20;

  baseRisk *= confidence;

  const features = [];
  const heatData = [];

  floodZones.forEach(z=>{
    let risk = Math.min(100, baseRisk + z.offset);
    let color = risk < 30 ? "green" : risk < 60 ? "#d4a000" : "red"; 

    // --- NEW OVERRIDE LOGIC ---
    // Hardcode Alam Budiman to always be a designated Safe Zone
    if (z.name === "Alam Budiman / Setia Alam") {
        risk = 5;       // Force risk down to 5%
        color = "green"; // Force circle color to green
    }
    // --------------------------

    features.push({
      type:"Feature",
      geometry:{type:"Point",coordinates:[z.lng,z.lat]},
      properties:{name:z.name,risk,color}
    });

    // The heatmap will also stay clear over Alam Budiman because 'risk' is small
    heatData.push([z.lat, z.lng, Math.min(2.5, risk / 35)]);
  });

  if(geoLayer) geoLayer.remove();
  if(heatLayer) heatLayer.remove();

  geoLayer = L.geoJSON(
    {type:"FeatureCollection",features},
    {
      pointToLayer:(f,latlng)=>L.circleMarker(latlng,{
        radius:18,
        fillColor:f.properties.color,
        color:"#000",
        weight:1,
        fillOpacity:0.8
      }),
      onEachFeature:(f,l)=>{
        
        let ttdHtml = "";
        
        // --- SAFE ZONE POPUP OVERRIDE ---
        if (f.properties.name === "Alam Budiman / Setia Alam") {
            ttdHtml = "<span style='color:green;'>✅ SAFE ZONE</span>";
        } else if (ttd === -1) {
          ttdHtml = "<span style='color:green;'>✅ SAFE</span>";
        } else if (ttd > 600) {
          ttdHtml = "<span style='color:#d4a000;'>⚠️ MONITOR</span>";
        } else {
          ttdHtml = "<span style='color:red;'>⚠️ DANGER IN " + Math.round(ttd) + "s</span>";
        }

        l.bindPopup(
          `<div style="font-family: Arial, sans-serif; min-width: 200px;">
            <h3 style="margin: 0 0 8px 0; color: #333; font-size: 16px;">${f.properties.name}</h3>
            
            <div style="padding: 6px; border-radius: 4px; background-color: ${f.properties.color}; color: ${f.properties.color === '#d4a000' ? '#000' : '#fff'}; font-weight: bold; text-align: center; margin-bottom: 10px;">
              Risk Status: ${Math.round(f.properties.risk)}%
            </div>
            
            <p style="margin: 4px 0; font-size: 14px;">🌧 <b>Rainfall:</b> ${rain.toFixed(1)} mm/h</p>
            <p style="margin: 4px 0; font-size: 14px;">🌊 <b>Water Trend:</b> ${
              trend === 1 ? "<span style='color:red; font-weight:bold;'>RISING 📈</span>" : 
              trend === 2 ? "<span style='color:green; font-weight:bold;'>FALLING 📉</span>" : "STABLE ➖"
            }</p>
            <p style="margin: 4px 0; font-size: 14px;">🧮 <b>Drain Volume:</b> ${volume.toFixed(0)} L</p>
            
            <hr style="margin: 12px 0; border: 0; border-top: 1px solid #ddd;">
            
            <div style="text-align: center;">
              <span style="font-size: 13px; color: #555; text-transform: uppercase; letter-spacing: 1px;">Evacuation Status</span><br>
              <span style="font-weight:bold; font-size: 18px;">
                ${ttdHtml}
              </span>
            </div>
          </div>`
        );
      }
    }
  ).addTo(map);

  heatLayer = L.heatLayer(heatData,{
    radius:120,
    blur:70,
    maxZoom:15
  }).addTo(map);

  if(ttd > 0 && ttd < 300 && confidence > 0.7 && !alertActive){
    alertActive = true;
    alert("⚠️ FLOOD PREDICTED SOON!\nPlease follow the red evacuation route to the Safe Shelter.");
    setTimeout(() => alertActive = false, 20000); 
  }
}

// ================= LEGEND =================
const legend = L.control({position:"bottomright"});
legend.onAdd = function(){
  const div = L.DomUtil.create("div","legend");
  div.innerHTML = `
    <b>Legend</b><br>
    🏃 Live User<br>
    🏠 Safe Shelter<br><hr>
    <i class="circle" style="background:red"></i> High Risk<br>
    <i class="circle" style="background:#d4a000"></i> Moderate Risk<br>
    <i class="circle" style="background:green"></i> Low Risk / Safe Zone<br><hr>
    <b style="color:red">━ Evacuation Route</b><br>
    <b style="color:red; border-bottom: 3px dashed red;">&nbsp;&nbsp;&nbsp;&nbsp;</b> Fallback Route
  `;
  return div;
};
legend.addTo(map);

// ================= START =================
updateMap();
startLiveLocation();
setInterval(updateMap,3000);
</script>
</body>
</html>
